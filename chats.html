<!-- FILE: chats.html (Listado de chats estilo WhatsApp) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Encuentros • Chats</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1021;--text:#E8ECF7;--muted:#9AA0B7;--primary:#635BFF;--secondary:#22D3EE;--card:#121735;--radius:18px}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    header{position:sticky;top:0;background:linear-gradient(180deg,#0b1021, rgba(11,16,33,.6));backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);z-index:10}
    .top{display:flex;align-items:center;justify-content:space-between;padding:16px}
    .search{padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#0f1430;color:var(--text);width:100%}
    .container{padding:12px 12px 90px}
    .chat{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:14px;background:var(--card);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}
    .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:grid;place-items:center;font-weight:800}
    .name{font-weight:700}
    .preview{color:var(--muted);font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
    .badge{font-size:.7rem;padding:4px 8px;border-radius:999px;background:rgba(99,91,255,.2); border:1px solid rgba(99,91,255,.5)}
    nav.bottom{position:fixed;bottom:10px;left:0;right:0;display:flex;justify-content:center}
    .nav-wrap{width:min(820px,94%);display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);padding:10px;border-radius:16px}
    .tab{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:12px;color:var(--text);text-decoration:none;border:1px solid transparent}
    .tab.active{background:linear-gradient(135deg, rgba(99,91,255,.25), rgba(34,211,238,.2)); border-color:rgba(255,255,255,.2)}
  </style>
</head>
<body>
  <header>
    <div style="padding:0 12px 12px">
      <input class="search" placeholder="Buscar conversaciones">
    </div>
  </header>

  <main class="container">
    <a class="chat" href="chat.html" aria-label="Abrir chat Almuerzo equipo">
      <div class="avatar">AE</div>
      <div>
        <div class="name">Almuerzo equipo</div>
        <div class="preview">Tú: Perfecto, nos vemos a las 12:30</div>
      </div>
      <div class="meta">
        <small style="color:var(--muted)">11:02</small>
        <div class="badge">3</div>
      </div>
    </a>

    <a class="chat" href="chat.html" aria-label="Abrir chat Fútbol jueves">
      <div class="avatar">FJ</div>
      <div>
        <div class="name">Fútbol jueves</div>
        <div class="preview">Sofi: llevo los guantes 🧤</div>
      </div>
      <div class="meta">
        <small style="color:var(--muted)">Ayer</small>
      </div>
    </a>

    <a class="chat" href="chat.html" aria-label="Abrir chat Cine viernes">
      <div class="avatar">CV</div>
      <div>
        <div class="name">Cine viernes</div>
        <div class="preview">Juan: compré las entradas 🎟️</div>
      </div>
      <div class="meta">
        <small style="color:var(--muted)">Lun</small>
      </div>
    </a>
  </main>

  <nav class="bottom" aria-label="Navegación">
    <div class="nav-wrap">
      <a class="tab" href="dashboard.html">🗓️ <span>Calendario</span></a>
      <a class="tab active" href="chats.html">💬 <span>Chats</span></a>
      <a class="tab" href="settings.html">⚙️ <span>Cuenta</span></a>
      <a class="tab" href="notifications.html">🔔 <span>Notificaciones</span></a>
    </div>
  </nav>
</body>
</html>
